<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Transferir entre mis cuentas</title>

<!--AQUI VA MI BOOPSTRAP-->
    <link rel="stylesheet" href="/Css/bootstrap.css">
    <link rel="stylesheet" href="./Css/example.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

    <header>


        <div class="text-center mt-4">
            <h2 class="titulo-transferencia">Transferir entre mis cuentas</h2>
            <h3 class="texto-saldo">Saldo disponible</h3>
            <h4 id="saldoDisponible">$1.250.000</h4>
        </div>
    </header>

    <main class="container vh-100 d-flex justify-content-center align-items-center">

        <div class="card shadow-sm" style="width: 500px;">
            <div class="card-body">

                <h3 class="text-center mb-4">Transferencia interna</h3>

                <form id="formTransferencia">
                    <div class="mb-3">
                        <label class="form-label">Cuenta origen</label>
                        <select class="form-control" id="cuentaOrigen">
                            <option value="100000">Pay-pal</option>
                            <option value="1250000">Cuenta Corriente</option>
                            <option value="500000">Cuenta Ahorro</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cuenta destino</label>
                        <select class="form-control" id="cuentaDestino">
                            <option>Pay-pal</option>
                            <option>Cuenta Corriente</option>
                            <option>Cuenta Ahorro</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Monto a transferir</label>
                        <input type="number" class="form-control" id="monto" placeholder="Ingrese monto">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input type="text" class="form-control" id="descripcion" placeholder="Transferencia interna">
                    </div>
                    <!-- <button id="btnVolverMenu" class="boton-walletDEPOSITO1">
                        <i class="bi bi-arrow-left-right"></i>
                        Transferir
                    </button>-->
                    <button type="button" id="btnTransferir" class="boton-walletDEPOSITO1">
                        <i class="bi bi-arrow-left-right"></i>
                        Transferir
                    </button>
                </form>

            </div>
        </div>

    </main>
    <button class="boton-walletDEPOSITO2" onclick="window.location.href='Menu.html'">
        <i class="bi bi-arrow-left-circle-fill"></i>
        Home
    </button>


    <script src="./Assets/Js/jquery/Jquery.js"></script>
    <script src="./Assets/Js/transferencia.js"></script>
    <script src="./Assets/Js/script.js"></script>
    <script src="./Assets/Js/deposito.js"></script>
    <script src="./Assets/Js/sendmoney.js"></script>
    

</body>

</html>
