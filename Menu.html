<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- ESTE ES MI BOOPSTRAP-->
    <link rel="stylesheet" href="./Css/bootstrap.css" crossorigin="anonymous">
    <link rel="stylesheet" href="Css/menu.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>
    <header>
        <div class="container py-3">

            <!-- ENCABEZADO -->
            <div id="encabezado"
                class="d-flex flex-column flex-md-row align-items-center justify-content-center text-center gap-3">

                <img id="avatar" src="./Img/avatar.jpg" alt="Avatar" class="rounded-circle img-fluid"
                    style="width: 90px; height: 90px; object-fit: cover; border: 3px solid #4c8da9;">

                <h1 id="saludo" class="m-0">Hola, Fernanda</h1>

                <i id="campana" class="bi bi-bell-fill fs-3"></i>
            </div>

            <!-- SALDO -->

            <div id="saldo-container" class="d-flex justify-content-center align-items-center gap-2 mt-3"
                style="background-color: rgba(255,255,255,0.08); padding: 12px; border-radius: 12px;">

                <i id="iconoSaldo" class="bi bi-wallet2 fs-4" style="color:#4cc9f0;"></i>

                <h3 id="saldo" class="m-0" style="color:#ffffff; font-weight:bold;">
                    1.250.000
                </h3>
            </div>

            <!-- SERVICIOS -->
            <div id="servicios" class="mt-4 p-3 rounded">

                <h2 class="text-center mb-3">
                    <i class="bi bi-receipt"></i> Pago de Servicios
                </h2>

                <div class="opcion-servicio">
                    <i class="bi bi-lightning-charge-fill"></i>
                    <span>Electricidad</span>
                </div>

                <div class="opcion-servicio">
                    <i class="bi bi-droplet-fill"></i>
                    <span>Agua</span>
                </div>

                <div class="opcion-servicio">
                    <i class="bi bi-wifi"></i>
                    <span>Internet</span>
                </div>

                <div class="opcion-servicio">
                    <i class="bi bi-telephone-fill"></i>
                    <span>Telefonía</span>
                </div>

            </div>

        </div>
    </header>

    <!--ESTE ES MI BARRA DE MENU-->

<div class="d-flex flex-wrap justify-content-center gap-2">

<div class="d-flex justify-content-center"></div>
        <button id="miBoton" class="btn btn-secondary">
            <i class="bi bi-house-fill"></i> Inicio
        </button>

        <button id="btnTransferir" class="btn btn-secondary">
            <i class="bi bi-arrow-left-right"></i> Transferir
        </button>

        <button id="btnMovimientos" class="btn btn-secondary">
            <i class="bi bi-clock-history"></i> Últimos Movimientos
        </button>
        <button id="btnMisCuentas" class="btn btn-secondary">
            <i class="bi bi-bank"></i> Transferir entre mis cuentas
        </button>
        <button id="btnServicios" class="btn btn-secondary">
            <i class="bi bi-receipt"></i> Pagar Servicios
        </button>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./Assets/Js/jquery/Jquery.js"></script>
    <script src="./Assets/Js/menu.js"></script> 
  

</body >
