      <h3 id="saldodisponible">Saldo disponible</h3>

    <!-- AQUI PARA INGRESAR DATOS DE CONTACTOS EXISTENTES -->

    <main class="container vh-100 d-flex justify-content-center align-items-center">

      <div class="card shadow-sm" style="width: 500px;">

            </div>

            <div class="mb-3">
              <label for="cuenta" class="form-label">Cuenta destino</label>
              <input type="text" class="form-control" id="cuenta" placeholder="Número o nombre de la cuenta" required>
            </div>

            <div class="mb-3">
              <label for="descripcion" class="form-label">Descripción (opcional)</label>
              <input type="text" class="form-control" id="descripcion" placeholder="Ej: Pago recibo">
            </div>

            <div class="d-flex justify-content-between">
